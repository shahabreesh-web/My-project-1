<!DOCTYPE html>
<html lang="bn" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><polygon points='50,15 80,32 80,68 50,85 20,68 20,32' fill='none' stroke='%23fbbf24' stroke-width='4' stroke-linejoin='round'/><polygon points='50,25 71,37 71,63 50,75 29,63 29,37' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-dasharray='4,2'/><circle cx='50' cy='50' r='12' fill='%23fbbf24'/><path d='M38,44 C25,30 20,40 38,48 Z' fill='%23bae6fd' opacity='0.8'/><path d='M62,44 C75,30 80,40 62,48 Z' fill='%23bae6fd' opacity='0.8'/><circle cx='46' cy='48' r='2' fill='%230f172a'/><circle cx='54' cy='48' r='2' fill='%230f172a'/><path d='M40,50 L25,50 M60,50 L75,50 M50,38 L50,20' stroke='%2364748b' stroke-width='2' stroke-linecap='round'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Welcome to bee-eye - Next Generation Platform" />
    <title>bee-eye | Next-Gen Platform</title>
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        /* Modern Minimalist Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        /* Pre-loader Glowing Effect */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0f19; display: flex; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 0.5s ease;
        }
        .pulsing-bee {
            width: 80px; height: 80px;
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(0.95); opacity: 0.6; filter: drop-shadow(0 0 5px rgba(251,191,36,0.2)); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 20px rgba(56,189,248,0.6)); }
        }
    </style>
</head>
<body class="antialiased bg-slate-950 text-slate-100 selection:bg-cyan-500 selection:text-slate-950">
    <!-- Modern Preloader View -->
    <div id="loader">
        <img class="pulsing-bee" src="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><polygon points='50,15 80,32 80,68 50,85 20,68 20,32' fill='none' stroke='%23fbbf24' stroke-width='4' stroke-linejoin='round'/><polygon points='50,25 71,37 71,63 50,75 29,63 29,37' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-dasharray='4,2'/><circle cx='50' cy='50' r='12' fill='%23fbbf24'/><path d='M38,44 C25,30 20,40 38,48 Z' fill='%23bae6fd' opacity='0.8'/><path d='M62,44 C75,30 80,40 62,48 Z' fill='%23bae6fd' opacity='0.8'/><circle cx='46' cy='48' r='2' fill='%230f172a'/><circle cx='54' cy='48' r='2' fill='%230f172a'/><path d='M40,50 L25,50 M60,50 L75,50 M50,38 L50,20' stroke='%2364748b' stroke-width='2' stroke-linecap='round'/></svg>" alt="Loading..." />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
        // Smoothly hide loader after content mounts
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 300);
        });
    </script>
</body>
</html>
